version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: sart_db
    environment:
      MYSQL_DATABASE: sart_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sart_user
      MYSQL_PASSWORD: sart_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: sart_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    #environment:
    #  - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/sart_db?createDatabaseIfNotExist=true&useSSL=false
    #  - SPRING_DATASOURCE_USERNAME=sart_user
    #  - SPRING_DATASOURCE_PASSWORD=sart_password

volumes:
  db_data:
