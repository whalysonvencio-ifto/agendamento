<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatórios - SART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/logo.png}" alt="Logo SART" height="30" class="d-inline-block align-text-top me-2">
                SART
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="/professores">Professores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/turmas">Turmas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/equipamentos">Equipamentos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/relatorios">Relatórios</a></li>
                </ul>
            </div>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-4">Relatório Geral de Reservas</h2>
        
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Equipamento</th>
                    <th>Professor</th>
                    <th>Turma</th>
                    <th>Status Final</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reserva : ${reservas}">
                    <td th:text="${#temporals.format(reserva.data, 'dd/MM/yyyy')}"></td>
                    <td th:text="${reserva.horarioAula} + 'º Horário'"></td>
                    <td th:text="${reserva.equipamento.nome}"></td>
                    <td th:text="${reserva.professor.nome}"></td>
                    <td th:text="${reserva.turma.nome}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${reserva.status.name() == 'ATIVA' ? 'bg-primary' : 
                                             (reserva.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                             (reserva.status.name() == 'CONCLUIDA' ? 'bg-success' : 
                                             (reserva.status.name() == 'CANCELADA' ? 'bg-secondary' : 'bg-danger')))}"
                              th:text="${reserva.status}">
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(reservas)}">
                    <td colspan="6" class="text-center">Nenhuma reserva registrada no sistema.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
