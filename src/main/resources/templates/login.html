<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Login')}"></head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-calendar-check text-primary mb-3" style="font-size: 3rem;" aria-hidden="true"></i>
                            <h3 class="card-title fw-bold text-dark mb-0">SART</h3>
                            <p class="text-muted small">Sistema de Agendamento</p>
                        </div>
                        
                        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="fa-solid fa-circle-exclamation me-2" aria-hidden="true"></i>
                            <div>Usuário ou senha inválidos.</div>
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                            <i class="fa-solid fa-circle-check me-2" aria-hidden="true"></i>
                            <div>Sessão encerrada com sucesso.</div>
                        </div>
                        
                        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label">E-mail <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa-solid fa-envelope text-muted" aria-hidden="true"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="username" name="username" required autofocus placeholder="seu@email.com">
                                    <div class="invalid-feedback">O e-mail é obrigatório.</div>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label">Senha <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa-solid fa-lock text-muted" aria-hidden="true"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required placeholder="Sua senha">
                                    <div class="invalid-feedback">A senha é obrigatória.</div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" aria-label="Acessar o sistema">
                                <i class="fa-solid fa-right-to-bracket me-1" aria-hidden="true"></i> Entrar
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4 text-muted small">
                    &copy; 2026 SART. Todos os direitos reservados.
                </div>
            </div>
        </div>
    </div>
    
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
