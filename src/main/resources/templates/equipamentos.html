<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Gestão de Equipamentos')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('equipamentos')}"></div>
    
    <main role="main" class="container mt-4">
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="mb-0">Gestão de Equipamentos</h2>
            <a href="/equipamentos/novo" class="btn btn-primary" aria-label="Cadastrar novo equipamento">
                <i class="fa-solid fa-plus me-1" aria-hidden="true"></i> Novo Equipamento
            </a>
        </div>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Nome</th>
                        <th scope="col">Descrição</th>
                        <th scope="col">Status Físico</th>
                        <th scope="col">Ativo no Sistema</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="equipamento : ${equipamentos}">
                        <td th:text="${equipamento.nome}"></td>
                        <td th:text="${equipamento.descricao}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${equipamento.status.name() == 'DISPONIVEL' ? 'bg-success' : 
                                                 (equipamento.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                                 (equipamento.status.name() == 'RESERVADO' ? 'bg-primary' : 'bg-danger'))}"
                                  th:text="${equipamento.status}">
                            </span>
                        </td>
                        <td>
                            <span class="badge" th:classappend="${equipamento.ativo ? 'bg-success' : 'bg-secondary'}" th:text="${equipamento.ativo ? 'Sim' : 'Não'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/equipamentos/editar/{id}(id=${equipamento.id})}" class="btn btn-sm btn-warning" aria-label="Editar equipamento">
                                <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i> Editar
                            </a>
                            <form th:if="${equipamento.ativo}" th:action="@{/equipamentos/excluir/{id}(id=${equipamento.id})}" method="post" class="d-inline needs-validation">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja inativar este equipamento?')" aria-label="Inativar equipamento">
                                    <i class="fa-solid fa-trash" aria-hidden="true"></i> Inativar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(equipamentos)}">
                        <td colspan="5" class="empty-state">
                            <i class="fa-solid fa-laptop" aria-hidden="true"></i>
                            <p class="mb-0">Nenhum equipamento cadastrado.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
