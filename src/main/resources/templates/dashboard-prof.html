<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Painel do Professor')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('inicio')}"></div>
    
    <main role="main" class="container mt-4">
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>

        <div class="mb-4 shadow-sm rounded">
            <img th:src="@{/images/banner.png}" alt="Banner SART" class="img-fluid rounded w-100" style="max-height: 250px; object-fit: cover;">
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="mb-0">Meu Histórico de Reservas</h2>
            <a href="/reservas/nova" class="btn btn-primary" aria-label="Criar Nova Reserva">
                <i class="fa-solid fa-plus me-1" aria-hidden="true"></i> Nova Reserva
            </a>
        </div>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Data</th>
                        <th scope="col">Horário</th>
                        <th scope="col">Equipamento</th>
                        <th scope="col">Turma</th>
                        <th scope="col">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${historico}">
                        <td th:text="${#temporals.format(reserva.data, 'dd/MM/yyyy')}"></td>
                        <td th:text="${reserva.horarioAula} + 'º Horário'"></td>
                        <td th:text="${reserva.equipamento.nome}"></td>
                        <td th:text="${reserva.turma.nome}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${reserva.status.name() == 'ATIVA' ? 'bg-primary' : 
                                                 (reserva.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                                 (reserva.status.name() == 'CONCLUIDA' ? 'bg-success' : 
                                                 (reserva.status.name() == 'CANCELADA' ? 'bg-secondary' : 'bg-danger')))}"
                                  th:text="${reserva.status}">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(historico)}">
                        <td colspan="5" class="empty-state">
                            <i class="fa-solid fa-history" aria-hidden="true"></i>
                            <p class="mb-0">Você ainda não realizou nenhuma reserva.</p>
                            <a href="/reservas/nova" class="btn btn-outline-primary mt-3 btn-sm">Agendar agora</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
