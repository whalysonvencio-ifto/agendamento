<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Professores - SART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/logo.png}" alt="Logo SART" height="30" class="d-inline-block align-text-top me-2">
                SART
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/professores">Professores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/turmas">Turmas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/equipamentos">Equipamentos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/relatorios">Relatórios</a></li>
                </ul>
            </div>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestão de Professores</h2>
            <a href="/professores/novo" class="btn btn-primary">Novo Professor</a>
        </div>
        
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="professor : ${professores}">
                    <td th:text="${professor.nome}"></td>
                    <td th:text="${professor.email}"></td>
                    <td>
                        <span class="badge" th:classappend="${professor.ativo ? 'bg-success' : 'bg-danger'}" th:text="${professor.ativo ? 'Ativo' : 'Inativo'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/professores/editar/{id}(id=${professor.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <form th:if="${professor.ativo}" th:action="@{/professores/excluir/{id}(id=${professor.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja inativar este professor?')">Inativar</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(professores)}">
                    <td colspan="4" class="text-center">Nenhum professor cadastrado.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
