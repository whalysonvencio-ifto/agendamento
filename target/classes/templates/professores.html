<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Gestão de Professores')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('professores')}"></div>
    
    <main role="main" class="container mt-4">
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="mb-0">Gestão de Professores</h2>
            <a href="/professores/novo" class="btn btn-primary" aria-label="Cadastrar novo professor">
                <i class="fa-solid fa-plus me-1" aria-hidden="true"></i> Novo Professor
            </a>
        </div>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Nome</th>
                        <th scope="col">E-mail</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="professor : ${professores}">
                        <td th:text="${professor.nome}"></td>
                        <td th:text="${professor.email}"></td>
                        <td>
                            <span class="badge" th:classappend="${professor.ativo ? 'bg-success' : 'bg-danger'}" th:text="${professor.ativo ? 'Ativo' : 'Inativo'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/professores/editar/{id}(id=${professor.id})}" class="btn btn-sm btn-warning" aria-label="Editar professor">
                                <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i> Editar
                            </a>
                            <form th:if="${professor.ativo}" th:action="@{/professores/excluir/{id}(id=${professor.id})}" method="post" class="d-inline needs-validation">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja inativar este professor?')" aria-label="Inativar professor">
                                    <i class="fa-solid fa-trash" aria-hidden="true"></i> Inativar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(professores)}">
                        <td colspan="4" class="empty-state">
                            <i class="fa-solid fa-users-slash" aria-hidden="true"></i>
                            <p class="mb-0">Nenhum professor cadastrado.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
