<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Relatórios Gerais')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('relatorios')}"></div>
    
    <main role="main" class="container mt-4">
        <h2 class="mb-4">Relatório Geral de Reservas</h2>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Data</th>
                        <th scope="col">Horário</th>
                        <th scope="col">Equipamento</th>
                        <th scope="col">Professor</th>
                        <th scope="col">Turma</th>
                        <th scope="col">Status Final</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${reservas}">
                        <td th:text="${#temporals.format(reserva.data, 'dd/MM/yyyy')}"></td>
                        <td th:text="${reserva.horarioAula} + 'º Horário'"></td>
                        <td th:text="${reserva.equipamento.nome}"></td>
                        <td th:text="${reserva.professor.nome}"></td>
                        <td th:text="${reserva.turma.nome}"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${reserva.status.name() == 'ATIVA' ? 'bg-primary' : 
                                                 (reserva.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                                 (reserva.status.name() == 'CONCLUIDA' ? 'bg-success' : 
                                                 (reserva.status.name() == 'CANCELADA' ? 'bg-secondary' : 'bg-danger')))}"
                                  th:text="${reserva.status}">
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservas)}">
                        <td colspan="6" class="empty-state">
                            <i class="fa-solid fa-file-invoice" aria-hidden="true"></i>
                            <p class="mb-0">Nenhuma reserva registrada no sistema.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
