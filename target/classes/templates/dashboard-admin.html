<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Painel Administrativo')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('inicio')}"></div>
    
    <main role="main" class="container mt-4">
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible" role="alert">
            <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>

        <div class="mb-4 shadow-sm rounded">
            <img th:src="@{/images/banner.png}" alt="Banner SART" class="img-fluid rounded w-100" style="max-height: 250px; object-fit: cover;">
        </div>
        
        <h2 class="mb-4">Painel de Controle - Entregas de Hoje</h2>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Equipamento</th>
                        <th scope="col">Professor</th>
                        <th scope="col">Turma</th>
                        <th scope="col">Horário</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="reserva : ${fila}">
                        <td th:text="${reserva.equipamento.nome}"></td>
                        <td th:text="${reserva.professor.nome}"></td>
                        <td th:text="${reserva.turma.nome}"></td>
                        <td th:text="${reserva.horarioAula} + 'º Horário'"></td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${reserva.status.name() == 'ATIVA' ? 'bg-primary' : 
                                                 (reserva.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                                 (reserva.status.name() == 'CONCLUIDA' ? 'bg-success' : 'bg-danger'))}"
                                  th:text="${reserva.status}">
                            </span>
                        </td>
                        <td>
                            <form th:if="${reserva.status.name() == 'ATIVA'}" th:action="@{/reserva/{id}/entregar(id=${reserva.id})}" method="post" class="d-inline needs-validation">
                                <button type="submit" class="btn btn-sm btn-primary" aria-label="Confirmar entrega do equipamento">
                                    <i class="fa-solid fa-check me-1" aria-hidden="true"></i> Confirmar Entrega
                                </button>
                            </form>
                            <form th:if="${reserva.status.name() == 'EM_USO' or reserva.status.name() == 'ATRASADA'}" th:action="@{/reserva/{id}/devolver(id=${reserva.id})}" method="post" class="d-inline needs-validation">
                                <button type="submit" class="btn btn-sm btn-success" aria-label="Confirmar devolução do equipamento">
                                    <i class="fa-solid fa-rotate-left me-1" aria-hidden="true"></i> Confirmar Devolução
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(fila)}">
                        <td colspan="6" class="empty-state">
                            <i class="fa-solid fa-box-open" aria-hidden="true"></i>
                            <p class="mb-0">Nenhuma reserva agendada para hoje.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
