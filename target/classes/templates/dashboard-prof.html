<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel do Professor - SART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/logo.png}" alt="Logo SART" height="30" class="d-inline-block align-text-top me-2">
                SART
            </a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="'Bem-vindo, ' + ${usuarioLogado}"></span>
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="mb-4 shadow-sm rounded">
            <img th:src="@{/images/banner.png}" alt="Banner SART" class="img-fluid rounded w-100" style="max-height: 250px; object-fit: cover;">
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Meu Histórico de Reservas</h2>
            <a href="/reservas/nova" class="btn btn-primary">Nova Reserva</a>
        </div>
        
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Equipamento</th>
                    <th>Turma</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reserva : ${historico}">
                    <td th:text="${#temporals.format(reserva.data, 'dd/MM/yyyy')}"></td>
                    <td th:text="${reserva.horarioAula} + 'º Horário'"></td>
                    <td th:text="${reserva.equipamento.nome}"></td>
                    <td th:text="${reserva.turma.nome}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${reserva.status.name() == 'ATIVA' ? 'bg-primary' : 
                                             (reserva.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                             (reserva.status.name() == 'CONCLUIDA' ? 'bg-success' : 
                                             (reserva.status.name() == 'CANCELADA' ? 'bg-secondary' : 'bg-danger')))}"
                              th:text="${reserva.status}">
                        </span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(historico)}">
                    <td colspan="5" class="text-center">Você ainda não realizou nenhuma reserva.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
