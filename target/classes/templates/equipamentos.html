<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Equipamentos - SART</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img th:src="@{/images/logo.png}" alt="Logo SART" height="30" class="d-inline-block align-text-top me-2">
                SART
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="/professores">Professores</a></li>
                    <li class="nav-item"><a class="nav-link" href="/turmas">Turmas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/equipamentos">Equipamentos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/relatorios">Relatórios</a></li>
                </ul>
            </div>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestão de Equipamentos</h2>
            <a href="/equipamentos/novo" class="btn btn-primary">Novo Equipamento</a>
        </div>
        
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Status Físico</th>
                    <th>Ativo no Sistema</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="equipamento : ${equipamentos}">
                    <td th:text="${equipamento.nome}"></td>
                    <td th:text="${equipamento.descricao}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${equipamento.status.name() == 'DISPONIVEL' ? 'bg-success' : 
                                             (equipamento.status.name() == 'EM_USO' ? 'bg-warning text-dark' : 
                                             (equipamento.status.name() == 'RESERVADO' ? 'bg-primary' : 'bg-danger'))}"
                              th:text="${equipamento.status}">
                        </span>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${equipamento.ativo ? 'bg-success' : 'bg-secondary'}" th:text="${equipamento.ativo ? 'Sim' : 'Não'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/equipamentos/editar/{id}(id=${equipamento.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <form th:if="${equipamento.ativo}" th:action="@{/equipamentos/excluir/{id}(id=${equipamento.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja inativar este equipamento?')">Inativar</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(equipamentos)}">
                    <td colspan="5" class="text-center">Nenhum equipamento cadastrado.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
