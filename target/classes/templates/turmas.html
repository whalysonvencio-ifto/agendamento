<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Gestão de Turmas')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('turmas')}"></div>
    
    <main role="main" class="container mt-4">
        <div th:if="${mensagem}" class="alert alert-success alert-dismissible" role="alert">
            <span th:text="${mensagem}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 class="mb-0">Gestão de Turmas</h2>
            <a href="/turmas/nova" class="btn btn-primary" aria-label="Cadastrar nova turma">
                <i class="fa-solid fa-plus me-1" aria-hidden="true"></i> Nova Turma
            </a>
        </div>
        
        <div class="table-responsive shadow-sm rounded bg-white">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Nome da Turma</th>
                        <th scope="col">Status</th>
                        <th scope="col">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="turma : ${turmas}">
                        <td th:text="${turma.nome}"></td>
                        <td>
                            <span class="badge" th:classappend="${turma.ativo ? 'bg-success' : 'bg-danger'}" th:text="${turma.ativo ? 'Ativa' : 'Inativa'}"></span>
                        </td>
                        <td>
                            <a th:href="@{/turmas/editar/{id}(id=${turma.id})}" class="btn btn-sm btn-warning" aria-label="Editar turma">
                                <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i> Editar
                            </a>
                            <form th:if="${turma.ativo}" th:action="@{/turmas/excluir/{id}(id=${turma.id})}" method="post" class="d-inline needs-validation">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Tem certeza que deseja inativar esta turma?')" aria-label="Inativar turma">
                                    <i class="fa-solid fa-trash" aria-hidden="true"></i> Inativar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(turmas)}">
                        <td colspan="3" class="empty-state">
                            <i class="fa-solid fa-chalkboard-user" aria-hidden="true"></i>
                            <p class="mb-0">Nenhuma turma cadastrada.</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
