<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Formulário de Professor')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('professores')}"></div>
    
    <main role="main" class="container mt-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white">
                <h2 class="h5 mb-0" th:text="${professor.id == null ? 'Cadastrar Novo Professor' : 'Editar Professor'}">Cadastro de Professor</h2>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/professores/salvar}" th:object="${professor}" method="post" class="needs-validation" novalidate>
                    <input type="hidden" th:field="*{id}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome Completo <span class="text-danger">*</span></label>
                            <input type="text" id="nome" class="form-control" th:field="*{nome}" required placeholder="Ex: João da Silva">
                            <div class="invalid-feedback">O nome do professor é obrigatório.</div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">E-mail <span class="text-danger">*</span></label>
                            <input type="email" id="email" class="form-control" th:field="*{email}" required placeholder="Ex: joao@escola.com">
                            <div class="invalid-feedback">Informe um e-mail válido.</div>
                        </div>
                        <div class="col-md-6" th:if="${professor.id == null}">
                            <label for="senha" class="form-label">Senha Inicial <span class="text-danger">*</span></label>
                            <input type="password" id="senha" class="form-control" th:field="*{senha}" required>
                            <div class="invalid-feedback">A senha é obrigatória.</div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-primary" aria-label="Salvar professor">
                            <i class="fa-solid fa-floppy-disk me-1" aria-hidden="true"></i> Salvar
                        </button>
                        <a href="/professores" class="btn btn-secondary" aria-label="Cancelar edição">
                            <i class="fa-solid fa-xmark me-1" aria-hidden="true"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
