<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments :: head('Formulário de Turma')}"></head>
<body>
    <div th:replace="~{fragments :: navbar('turmas')}"></div>
    
    <main role="main" class="container mt-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white">
                <h2 class="h5 mb-0" th:text="${turma.id == null ? 'Cadastrar Nova Turma' : 'Editar Turma'}">Cadastro de Turma</h2>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/turmas/salvar}" th:object="${turma}" method="post" class="needs-validation" novalidate>
                    <input type="hidden" th:field="*{id}">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label for="nome" class="form-label">Nome da Turma <span class="text-danger">*</span></label>
                            <input type="text" id="nome" class="form-control" th:field="*{nome}" required placeholder="Ex: 3º Ano A">
                            <div class="invalid-feedback">O nome da turma é obrigatório.</div>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2 mt-4 pt-3 border-top">
                        <button type="submit" class="btn btn-primary" aria-label="Salvar turma">
                            <i class="fa-solid fa-floppy-disk me-1" aria-hidden="true"></i> Salvar
                        </button>
                        <a href="/turmas" class="btn btn-secondary" aria-label="Cancelar edição">
                            <i class="fa-solid fa-xmark me-1" aria-hidden="true"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
