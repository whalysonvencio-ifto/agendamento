# Servidor
server.port=8080

# Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=sart_user
spring.datasource.password=sart_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Console Desativado no ambiente principal
spring.h2.console.enabled=false

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Credenciais Iniciais do Administrador (Seed)
app.seed.admin.email=${ADMIN_SEED_EMAIL:admin@admin.com}
app.seed.admin.password=${ADMIN_SEED_PASSWORD:admin}
