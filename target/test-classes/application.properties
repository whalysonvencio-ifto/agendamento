spring.datasource.url=jdbc:h2:mem:sart_test_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilita o console do H2 para testes, não é necessário
spring.h2.console.enabled=false

# Logs mais verbosos para testes
logging.level.br.com.uab.sart=DEBUG

# Admin Configs para Testes
app.seed.admin.email=admin@admin.com
app.seed.admin.password=admin
